<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Altura del Río Paraguay</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700&family=Fraunces:opsz,wght@9..144,600&family=JetBrains+Mono:wght@400;600&display=swap"
      rel="stylesheet"
      media="print"
      data-font-async
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700&family=Fraunces:opsz,wght@9..144,600&family=JetBrains+Mono:wght@400;600&display=swap"
        rel="stylesheet"
      />
    </noscript>
    <script src="fonts.js"></script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-bg" aria-hidden="true"></div>
    <header class="hero">
      <h1 class="hero__title">Río Paraguay</h1>
      <div class="hero__actions">
        <button type="button" class="btn" id="btn-refresh">Actualizar</button>
        <a
          class="btn btn--ghost"
          href="https://www.meteorologia.gov.py/nivel-rio/indexconvencional.php"
          target="_blank"
          rel="noopener noreferrer"
          >Abrir fuente oficial</a
        >
      </div>
    </header>

    <div class="site-nav">
      <button
        type="button"
        class="nav-toggle"
        id="nav-toggle"
        aria-expanded="false"
        aria-controls="site-menu"
      >
        <span class="nav-toggle__bars" aria-hidden="true"></span>
        <span class="sr-only">Abrir menú de secciones</span>
      </button>
      <nav class="tabs" id="site-menu" aria-label="Secciones por río">
        <a href="/" class="tabs__item">Río Paraná</a>
        <a href="/paraguay.html" class="tabs__item tabs__item--current" aria-current="page"
          >Río Paraguay</a
        >
        <a href="/pasos.html" class="tabs__item">Pasos y profundidades</a>
      </nav>
    </div>

    <main class="main">
      <section class="status" id="status-panel" aria-live="polite">
        <p class="status__text" id="status-text">Cargando…</p>
      </section>

      <section class="meta meta--grid" id="meta-section" hidden>
        <div class="meta__chip meta__chip--block">
          <span class="meta__label">Extracción</span>
          <span class="meta__value" id="meta-time"></span>
        </div>
        <div class="meta__chip meta__chip--block">
          <span class="meta__label">Estaciones</span>
          <span class="meta__value" id="meta-count"></span>
        </div>
        <div class="meta__chip meta__chip--block" id="meta-db-chip" hidden>
          <span class="meta__label">SQLite</span>
          <span class="meta__value" id="meta-db"></span>
        </div>
      </section>

      <section class="warnings" id="warnings-block" hidden>
        <h2 class="warnings__title">Avisos</h2>
        <ul class="warnings__list" id="warnings-list"></ul>
      </section>

      <section class="toolbar" id="toolbar" hidden>
        <label class="sr-only" for="filter-input">Filtrar tabla</label>
        <input
          type="search"
          id="filter-input"
          class="filter-input"
          placeholder="Buscar por puerto…"
          autocomplete="off"
        />
      </section>

      <div class="table-wrap" id="table-root"></div>
    </main>

    <footer class="footer">
      <span
        >Fuente:
        <a
          href="https://www.meteorologia.gov.py/nivel-rio/indexconvencional.php"
          target="_blank"
          rel="noopener noreferrer"
          >meteorologia.gov.py</a
        >
      </span>
    </footer>

    <script src="config.js"></script>
    <script src="api-resolve.js"></script>
    <script src="ui.js"></script>
    <script src="nav.js"></script>
    <script src="paraguay.js"></script>
  </body>
</html>
